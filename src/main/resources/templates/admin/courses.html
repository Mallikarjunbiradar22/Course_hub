<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/admin/students">Students</a>
                <a class="nav-link" href="/admin/trainers">Trainers</a>
                <a class="nav-link" href="/admin/courses">Courses</a>
                <a class="nav-link" href="/admin/enrollments">Enrollments</a>
                <a class="nav-link" href="/trainer/dashboard">Manage Categories</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">All Courses</h1>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Price (₹)</th>
                    <th>Duration (Days)</th>
                    <th>Created Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.id}">1</td>
                    <td th:text="${course.title}">Java Programming</td>
                    <td th:text="${course.discription}">Learn Java from scratch</td>
                    <td th:text="${course.price}">9999</td>
                    <td th:text="${course.duration}">30</td>
                    <td th:text="${course.createdDate}">2024-01-01</td>
                    <td>
                        <button class="btn btn-sm btn-danger" th:onclick="'deleteCourse(' + ${course.id} + ')'">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function deleteCourse(courseId) {
            if (confirm('Are you sure you want to delete this course?')) {
                try {
                    const response = await fetch(`/course/delete/${courseId}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        alert('Course deleted successfully');
                        window.location.reload();
                    } else {
                        alert('Failed to delete course');
                    }
                } catch (err) {
                    alert('Error deleting course');
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
