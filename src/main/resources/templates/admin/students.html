<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/admin/students">Students</a>
                <a class="nav-link" href="/admin/trainers">Trainers</a>
                <a class="nav-link" href="/admin/courses">Courses</a>
                <a class="nav-link" href="/admin/enrollments">Enrollments</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">All Students</h1>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>College</th>
                    <th>Qualification</th>
                    <th>Verified</th>
                    <th>Approved Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.id}">1</td>
                    <td th:text="${student.name}">John Doe</td>
                    <td th:text="${student.email}">john@example.com</td>
                    <td th:text="${student.collegeName}">ABC College</td>
                    <td th:text="${student.qualification}">B.Tech</td>
                    <td>
                        <span th:if="${student.verified}" class="badge bg-success">Verified</span>
                        <span th:unless="${student.verified}" class="badge bg-danger">Not Verified</span>
                    </td>
                    <td>
                        <span th:if="${student.approved}" class="badge bg-success">Approved</span>
                        <button th:unless="${student.approved}" class="btn btn-sm btn-primary" th:onclick="'approveUser(' + ${student.id} + ')'">Approve</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function approveUser(userId) {
            if (confirm('Are you sure you want to approve this user?')) {
                try {
                    const response = await fetch(`/admin/approve/${userId}`, {
                        method: 'POST'
                    });
                    if (response.ok) {
                        alert('User approved successfully');
                        window.location.reload();
                    } else {
                        alert('Failed to approve user');
                    }
                } catch (err) {
                    alert('Error approving user');
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
