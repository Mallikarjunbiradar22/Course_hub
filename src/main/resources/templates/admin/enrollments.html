<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollments - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/admin/dashboard">Admin Dashboard</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/admin/students">Students</a>
                <a class="nav-link" href="/admin/trainers">Trainers</a>
                <a class="nav-link" href="/admin/courses">Courses</a>
                <a class="nav-link" href="/admin/enrollments">Enrollments</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="mb-4">All Enrollments</h1>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student</th>
                    <th>Course</th>
                    <th>Enrollment Date</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="enrollment : ${enrollments}">
                    <td th:text="${enrollment.id}">1</td>
                    <td th:text="${enrollment.student.name}">John Doe</td>
                    <td th:text="${enrollment.course.title}">Java Programming</td>
                    <td th:text="${enrollment.enrollmentDate}">2024-01-01</td>
                    <td>
                        <span th:if="${enrollment.status == 'ENROLLED'}" class="badge bg-success">Enrolled</span>
                        <span th:if="${enrollment.status == 'COMPLETED'}" class="badge bg-primary">Completed</span>
                        <span th:if="${enrollment.status == 'CANCELLED'}" class="badge bg-danger">Cancelled</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
